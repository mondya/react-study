<!--文件类型声明-->
<!DOCTYPE html>
<!--html元素囊括了页面中所有其他元素，整个页面只需要一个，称为根元素-->
<html lang="en">
<!-- head元素包含的是那些不用于展现内容的元素，如title, link, meta等-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- body元素包含的是那些用于展现内容的元素，如p, h1, img等-->
<body>
<p id="hello" title="hello world">hello world</p>
<p id="world">这是一个段落</p>
<p id="bold"><b>这是一个加粗的段落</b></p>
<!--空元素-->
<img src="1.png" width="300">

<!--常见元素-->
<h1>1号标题</h1>
<h2>2号标题</h2>
<h3>3号标题</h3>
<h4>4号标题</h4>
<h5>5号标题</h5>

<!--unordered list 无序列表-->
<ul>
    <li>列表项1</li>
    <li>列表项2</li>
    <li>列表项3</li>
</ul>

<!--ordered list 有序列表-->
<ol>
    <li>有序列表项1</li>
    <li>有序列表项2</li>
    <li>有序列表项3</li>
</ol>

<!--超链接 anchor-->
<a href="1.png">本地页面</a>
<a href="https://www.baidu.com">互联网页面</a>
<a href="#p1">页面内锚点</a>
<br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br>
<p id="p1">这是一个段落<a href="#">返回顶部</a></p>

<h1>多媒体</h1>
<!-- src格式有3种：1：直接填文件地址 2：dataUrl: data:图片格式;base64,编码后的字符串 3：objectUrl: 需要配合js生成 -->
<img src="图片路径">
<video src = "文件地址"></video>
<audio src = "文件地址"></audio>

<!--视频 controls:添加视频控制条-->
<video src="test.mp4" width="400" controls></video>

<!--音频 controls:添加音频控制条-->
<audio src="test.mp3" controls></audio>
</body>
</html>
