<!--文件类型声明-->
<!DOCTYPE html>
<!--html元素囊括了页面中所有其他元素，整个页面只需要一个，称为根元素-->
<html lang="en">
<!-- head元素包含的是那些不用于展现内容的元素，如title, link, meta等-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- body元素包含的是那些用于展现内容的元素，如p, h1, img等-->
<body>
<p id="hello" title="hello world">hello world</p>
<p id="world">这是一个段落</p>
<p id="bold"><b>这是一个加粗的段落</b></p>
<!--空元素-->
<img src="1.png" width="300">

<!--常见元素-->
<h1>1号标题</h1>
<h2>2号标题</h2>
<h3>3号标题</h3>
<h4>4号标题</h4>
<h5>5号标题</h5>

<!--unordered list 无序列表-->
<ul>
    <li>列表项1</li>
    <li>列表项2</li>
    <li>列表项3</li>
</ul>

<!--ordered list 有序列表-->
<ol>
    <li>有序列表项1</li>
    <li>有序列表项2</li>
    <li>有序列表项3</li>
</ol>

<!--超链接 an-->
</body>
</html>
