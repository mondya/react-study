<!--文件类型声明-->
<!DOCTYPE html>
<html lang="en">
<!-- head元素包含的是那些不用于展现内容的元素，如title, link, meta等-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- body元素包含的是那些用于展现内容的元素，如p, h1, img等-->
<body>
    <p id="hello" title="hello world">hello world</p>
    <p id="world">这是一个段落</p>
    <p id ="bold"><b>这是一个加粗的段落</b></p>
    <!--空元素-->
    <img src="1.png">
</body>
</html>
