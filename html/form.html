<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>form</title>
    </head>
    <body>
        <!-- 表单的语法：action:服务器地址  method:请求方式 enctype: 数据格式（在Post请求时，指定数据的格式。application/x-www-form-urlencoded时默认格式，multipart/form-data用于上传文件） -->
        <!-- 常见的表单项。文本框：text, 密码框：pasword 隐藏框:hidden 日期框：date 下拉选择框：select 单选框：radio 复选框：checkbox 文件上传：file-->
        <h1>表单学习</h1>
        <form action="https://www.baidu.com/s">
            <input type="text" name = "wd">
            <input type="submit" value="搜索">
        </form>

        <form action="http://localhost:80/api/login" method="post">
            <label for="username">用户名：</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="password">密码：</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <input type="submit" value="登录">
        </form>
        <br>
        <br>
        <form>
            <input type="hidden" name="token" value="123456">
            <input type="date" name="birthday">
            <input type="radio" name = "gender" value="1">男
            <input type="radio" name = "gender" value="0" checked>女
            <br>
            <input type="submit" value="提交">
        </form>

        <br>
        <br>
        <form>
            <input type="checkbox" name="hobby" value="1">足球
            <input type="checkbox" name="hobby" value="2">篮球
            <input type="checkbox" name="hobby" value="3" checked>跑步
            <br>
            <input type="submit" value="提交">
        </form>
    </body>
</html>
